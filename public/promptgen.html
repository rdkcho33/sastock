<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Studio - SASTOCK</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    .mode-toggle {
        display: flex;
        background: rgba(255, 255, 255, 0.05);
        padding: 4px;
        border-radius: 8px;
        margin-bottom: 20px;
    }
    .mode-btn {
        flex: 1;
        padding: 10px;
        border: none;
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
        border-radius: 6px;
        font-weight: 500;
        transition: all 0.2s;
    }
    .mode-btn.active {
        background: var(--accent-color);
        color: white;
    }
    .input-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
    }
    .full-width {
        grid-column: span 2;
    }
    .card-result {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        transition: transform 0.2s;
    }
    .card-result:hover {
        border-color: var(--accent-color);
    }
    .variant-group {
        display: flex;
        gap: 8px;
        margin-top: 15px;
    }
    .btn-variant {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-main);
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
    }
    .btn-variant:hover {
        background: rgba(255, 255, 255, 0.1);
    }
    .prompt-text {
        background: rgba(0,0,0,0.2);
        padding: 12px;
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.6;
        color: var(--text-main);
        white-space: pre-wrap;
    }
    .manual-only {
        transition: opacity 0.3s;
    }
    .disabled {
        opacity: 0.3;
        pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    
    <aside class="sidebar">
      <div class="panel controls-panel">
        <div class="panel-header">
          <div class="brand">
            <div class="brand-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            </div>
            <div>
              <h1>Prompt Studio</h1>
              <p>Creative Microstock AI</p>
            </div>
          </div>
          <div id="userProfile" class="user-profile" style="display: none;">
            <div class="user-info">
              <span id="userName">User</span>
              <span id="userRole" class="badge-role">User</span>
            </div>
            <div class="user-actions">
              <button id="logoutBtn" class="btn-logout" title="Logout">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
              </button>
            </div>
          </div>
        </div>

        <nav class="nav-menu">
           <a href="index.html" class="nav-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="3" y1="15" x2="9" y2="15"></line><line x1="3" y1="18" x2="9" y2="18"></line></svg>
              <span>Metadata Tool</span>
           </a>
           <a href="imgtoprompt.html" class="nav-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
              <span>Img To Prompt</span>
           </a>
           <a href="promptgen.html" class="nav-item active">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
              <span>Prompt Studio</span>
           </a>
        </nav>

        <div class="gemini-settings">
          <label>API Keys</label>
          <select id="activeKeySelect" class="key-selector">
            <option value="">Fetch API keys...</option>
          </select>
          
          <label style="margin-top: 15px;">Model</label>
          <select id="modelSelect">
            <option value="gemini-3-flash-preview">gemini-3-flash-preview</option>
            <option value="gemini-2.5-flash">gemini-2.5-flash</option>
          </select>

          <label style="margin-top: 15px;">Language</label>
          <select id="languageSelect">
            <option value="English">English</option>
            <option value="Indonesia">Bahasa Indonesia</option>
          </select>

          <label style="margin-top: 15px;">Batch Generation (1-20)</label>
          <input type="number" id="batchCount" min="1" max="20" value="3" style="width: 100%;" />
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="panel" style="flex: 1; display: flex; flex-direction: column; gap: 20px;">
        <div class="panel-header">
           <h2>Advanced Prompt Studio</h2>
        </div>

        <div class="mode-toggle">
            <button class="mode-btn active" data-mode="AUTO">AUTO MODE</button>
            <button class="mode-btn" data-mode="MANUAL">MANUAL MODE</button>
        </div>

        <div class="input-grid">
            <div class="full-width">
                <label class="section-label">TUJUAN FOTO (STOCK PURPOSE)</label>
                <textarea id="tujuanInput" placeholder="Contoh: Commercial stock photography for business website..." style="height: 60px;"></textarea>
            </div>
            <div class="full-width">
                <label class="section-label">OBJEK (SUBJECT)</label>
                <textarea id="objekInput" placeholder="Contoh: Diverse group of young professionals..." style="height: 60px;"></textarea>
            </div>
            
            <div class="manual-only disabled">
                <label class="section-label">EKSPRESI (EXPRESSION)</label>
                <textarea id="ekspresiInput" placeholder="Manual expression..." style="height: 60px;"></textarea>
            </div>
            <div class="manual-only disabled">
                <label class="section-label">AKTIVITAS (ACTIVITY)</label>
                <textarea id="aktivitasiInput" placeholder="Manual activity..." style="height: 60px;"></textarea>
            </div>
            <div class="manual-only disabled full-width">
                <label class="section-label">BACKGROUND / SETTING</label>
                <textarea id="backgroundInput" placeholder="Manual background..." style="height: 60px;"></textarea>
            </div>
        </div>

        <button id="generateBtn" class="btn btn-primary" style="height: 50px;">
           <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
           Generate Batch (AI Thinking...)
        </button>

        <div id="resultsHeader" style="display: none; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 class="section-label" style="margin-bottom: 0;">BATCH RESULTS</h3>
            <button id="copyAllBtn" class="btn btn-secondary btn-sm">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                Copy All Prompts
            </button>
        </div>

        <div id="resultsGrid">
            <!-- Cards will be injected here -->
        </div>

        <div id="emptyState" style="text-align: center; padding: 40px; color: var(--text-muted);">
            <p>Atur parameter di atas dan klik Generate untuk memulai pembuatan batch prompt.</p>
        </div>
      </div>
    </main>
  </div>

  <script src="promptgen.js"></script>
</body>
</html>
