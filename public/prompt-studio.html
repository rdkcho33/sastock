<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Studio | SASTOCK</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    .studio-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    .prompt-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      transition: all 0.3s ease;
    }
    .prompt-card:hover {
      background: rgba(255,255,255,0.05);
      border-color: var(--accent-primary);
    }
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 10px;
      border-radius: 4px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .status-pending { background: rgba(255,255,255,0.1); color: #fff; }
    .status-generating { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .status-success { background: rgba(16,185,129,0.2); color: #34d399; }
    .status-error { background: rgba(239,68,68,0.2); color: #f87171; }
    
    .lang-toggle {
      display: flex;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 15px;
    }
    .lang-btn {
      flex: 1;
      border: none;
      background: none;
      color: var(--text-muted);
      padding: 8px;
      font-size: 12px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .lang-btn.active {
      background: var(--accent-primary);
      color: white;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    
    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
      <div class="panel controls-panel">
        <div class="panel-header">
          <div class="brand">
            <div class="brand-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </div>
            <div>
              <h1>Studio</h1>
              <p>Realistic Stock</p>
            </div>
          </div>
          <div id="userProfile" class="user-profile" style="display: none;">
            <div class="user-info">
              <span id="userName">User</span>
              <span id="userRole" class="badge-role">User</span>
            </div>
            <button id="logoutBtn" class="btn-logout" title="Logout">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
          </div>
        </div>

        <nav class="nav-menu">
           <a href="index.html" class="nav-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
              <span>Metadata Tool</span>
           </a>
           <a href="imgtoprompt.html" class="nav-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
              <span>Img To Prompt</span>
           </a>
           <a href="prompt-studio.html" class="nav-item active">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
              <span>Prompt Studio</span>
           </a>
        </nav>

        <div class="gemini-settings">
          <label>API Keys</label>
          <select id="activeKeySelect" class="key-selector">
            <option value="">Fetch API keys...</option>
          </select>
          
          <label style="margin-top:12px;">Model</label>
          <select id="modelSelect">
            <option value="gemini-3-flash-preview">gemini-3-flash-preview</option>
            <option value="gemini-2.5-flash">gemini-2.5-flash</option>
            <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite</option>
          </select>
        </div>
      </div>

      <div class="panel settings-panel">
        <div class="panel-heading">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
          <h2>Configuration</h2>
        </div>
        
        <label class="section-label">OUTPUT LANGUAGE</label>
        <div class="lang-toggle">
          <button id="langEN" class="lang-btn active" onclick="setLang('en')">English</button>
          <button id="langID" class="lang-btn" onclick="setLang('id')">Indonesia</button>
        </div>

        <label class="section-label">BATCH COUNT (MAX 50)</label>
        <input type="number" id="batchCount" class="styled-input" min="1" max="50" value="5" />
        <p class="text-muted" style="font-size:10px; margin-top:4px;">Large batches run in a robust queue to avoid timeouts.</p>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <div class="input-section panel">
        <div class="panel-heading">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
          <h2>New Prompt Idea</h2>
        </div>
        
        <div class="studio-grid">
          <div class="input-group">
            <label class="section-label">TUJUAN FOTO (PURPOSE)</label>
            <textarea id="purposeInput" class="styled-input" placeholder="Contoh: Iklan kartu kredit, gaya hidup perkotaan, cinematic lighting" style="height: 100px;"></textarea>
          </div>
          <div class="input-group">
            <label class="section-label">OBJEK FOTO (OBJECTS)</label>
            <textarea id="objectInput" class="styled-input" placeholder="Contoh: 2 orang pria berpakaian formal sedang tertawa" style="height: 100px;"></textarea>
          </div>
        </div>

        <div class="action-bar" style="margin-top: 20px;">
          <button id="generateBtn" class="btn btn-primary" style="width: 100%;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path><path d="M5 3v4"></path><path d="M19 17v4"></path><path d="M3 5h4"></path><path d="M17 19h4"></path></svg>
            Generate Stock Prompts
          </button>
        </div>
      </div>

      <div class="results-header flex-between" style="margin: 20px 0 10px;">
        <h3 style="font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">Generated Prompts</h3>
        <div class="result-actions">
          <button id="copyAllBtn" class="btn btn-secondary btn-sm" style="display: none;">Copy All</button>
          <button id="clearBtn" class="btn btn-danger btn-sm">Clear All</button>
        </div>
      </div>

      <div id="resultsList" class="results-list">
        <!-- Prompts will appear here -->
      </div>
    </main>

    <!-- LOG DRAWER -->
    <div id="logConsole" class="log-console minimized">
      <div class="log-header">
        <div class="flex-center">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
          <span>Generation Log</span>
        </div>
        <div class="log-controls">
          <button id="clearLogBtn" class="log-btn-icon" title="Clear Logs"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
          <button id="toggleLogBtn" class="log-btn-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg></button>
        </div>
      </div>
      <div id="logBody" class="log-body">
        <div class="log-entry system">Ready to generate.</div>
      </div>
    </div>

  </div>

  <script src="prompt-studio.js"></script>
</body>
</html>
