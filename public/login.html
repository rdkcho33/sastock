<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SASTOCK Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.5s ease-out;
        }
        .login-brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-brand .brand-icon {
            margin: 0 auto 16px;
            width: 56px;
            height: 56px;
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-brand h1 {
            font-size: 24px;
            margin: 0;
            font-weight: 700;
        }
        .login-brand p {
            color: var(--text-muted);
            margin: 8px 0 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            margin-top: 12px;
        }
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .setup-notice {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="panel login-card">
            <div class="login-brand">
                <div class="brand-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                </div>
                <h1 id="pageTitle">Welcome Back</h1>
                <p id="pageDesc">Log in to your SASTOCK account</p>
            </div>

            <div id="errorMsg" class="error-message"></div>
            <div id="setupMsg" class="setup-notice">
                <strong>First-time Setup:</strong> Create the Admin account to get started.
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" id="submitBtn" class="btn btn-primary btn-login">Log In</button>
            </form>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const setupMsg = document.getElementById('setupMsg');
        const pageTitle = document.getElementById('pageTitle');
        const pageDesc = document.getElementById('pageDesc');
        const submitBtn = document.getElementById('submitBtn');

        let isFirstRun = false;

        // Check if first run
        async function checkStatus() {
            try {
                const res = await fetch('/api/auth/me');
                const data = await res.json();
                if (data.authenticated) {
                    window.location.href = '/';
                } else if (data.firstRun) {
                    isFirstRun = true;
                    setupMsg.style.display = 'block';
                    pageTitle.textContent = 'Setup Admin';
                    pageDesc.textContent = 'Create the first administrator account';
                    submitBtn.textContent = 'Create Admin Account';
                }
            } catch (err) {
                console.error('Status check failed', err);
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const url = isFirstRun ? '/api/auth/register' : '/api/auth/login';
            
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok) {
                    if (isFirstRun) {
                        // After register admin, log in automatically or ask to login
                        isFirstRun = false;
                        setupMsg.style.display = 'none';
                        errorMsg.style.display = 'block';
                        errorMsg.style.backgroundColor = 'rgba(34, 197, 94, 0.1)';
                        errorMsg.style.color = '#4ade80';
                        errorMsg.style.borderColor = 'rgba(34, 197, 94, 0.2)';
                        errorMsg.textContent = 'Admin created! Please log in.';
                        pageTitle.textContent = 'Welcome Back';
                        pageDesc.textContent = 'Log in to your SASTOCK account';
                        submitBtn.textContent = 'Log In';
                    } else {
                        window.location.href = '/';
                    }
                } else {
                    errorMsg.textContent = data.error || 'Authentication failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Something went wrong. Please try again.';
                errorMsg.style.display = 'block';
            }
        });

        checkStatus();
    </script>
</body>
</html>
